# X-MAGICAL TCC with the official XIRL ResNet18/ImageNet/full-train setup.
# This runs through the current TCC-core code path for a strict sanity check.

root_dir: /tmp/xirl/pretrain_runs
seed: 1
cudnn_deterministic: false
cudnn_benchmark: true
algorithm: tcc
logging_frequency: 100
checkpointing_frequency: 200

data:
  root: /tmp/xirl/datasets/xmagical/
  batch_size: 4
  video_sampler_seed: null
  pretrain_action_class: [gripper, longstick, mediumstick]
  max_vids_per_class: -1
  pretraining_video_sampler: random
  paired_metadata_path: ""
  paired_fixed_frames: -1
  paired_frame_sample_ratio: 0.5
  paired_max_frames: -1
  paired_min_frames: 16
  paired_drop_short_pairs: true
  paired_role_order: [h, r]
  paired_distinct_tasks_per_batch: false
  cross_camera_roles: [h, r]
  cross_camera_pair_role_order: []
  cross_camera_distinct_episodes: true
  task_role_camera_group_keys: [task_id]
  task_role_camera_pair_role_order: [h, r]
  task_role_camera_different_camera: true
  task_role_camera_different_episode: false

frame_sampler:
  image_ext: "*.png"
  strategy: uniform
  use_start_frame: false
  start_frame_metadata_path: ""
  num_frames_per_sequence: 40
  num_context_frames: 1
  context_stride: 3
  all_sampler:
    stride: 1
  strided_sampler:
    stride: 3
    offset: true
  uniform_sampler:
    offset: 0
  boundary_stratified_sampler:
    random_middle: true
  window_sampler: {}

data_augmentation:
  image_size: [112, 112]
  train_transforms: [random_resized_crop, color_jitter, grayscale, gaussian_blur]
  eval_transforms: [global_resize]

eval:
  val_iters: 20
  eval_frequency: 500

model:
  model_type: resnet18_linear
  embedding_size: 32
  fusion_size: 768
  vvcl_embedding_size: 128
  normalize_embeddings: false
  learnable_temp: false
  pretrain_path: ""
  vit_weights: none
  vit_pooling: patch_mean
  trainable_scope: all

loss:
  tcc:
    enabled: true
    stochastic_matching: false
    paired_matching: false
    loss_type: regression_mse
    cycle_length: 2
    label_smoothing: 0.1
    softmax_temperature: 1.0
    normalize_indices: true
    variance_lambda: 0.001
    huber_delta: 0.1
    similarity_type: l2
  soft_dtw:
    enabled: false
    weight: 0.1
    mode: contrastive
    gamma: 0.1
    temperature: 0.1
    divergence: true
    normalize_time: true
  vvcl:
    enabled: false
    weight: 1.0
    attention_pooling_heads: 1
    logit_scale_init: 1.0
    logit_bias_init: 0.0

optim:
  train_max_iters: 4000
  weight_decay: 0.0001
  lr: 0.00001
